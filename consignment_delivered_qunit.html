<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Delivered Consignment QUnit Test</title>
		<link rel="stylesheet" href="qunit/qunit-2.18.1.css">
		<style>
			body { font-family: Arial, sans-serif; margin: 16px; }
			.controls { margin: 0 0 16px; padding: 12px; border: 1px solid #c8d1dc; border-radius: 4px; }
			label { display: block; margin: 8px 0 4px; font-weight: 600; }
			input { width: min(560px, 100%); padding: 7px; }
		</style>
	</head>
	<body>
		<div class="controls">
			<label for="endpoint">API endpoint</label>
			<input id="endpoint" value="">
			<label for="username">Username</label>
			<input id="username" value="nextor@gmail.com">
			<label for="password">Password</label>
			<input id="password" value="sdfgsdfggggggg" type="password">
		</div>

		<div id="qunit"></div>
		<div id="qunit-fixture"></div>

		<script src="qunit/qunit-2.18.1.js"></script>
		<script>
			QUnit.config.autostart = false;
			document.getElementById('endpoint').value = window.location.protocol + '//' + window.location.host + '/PointOfSale';

			const scenario = {
				storeId: 1,
				initialStock: 20,
				deliveredQty: 3,
				soldQty: 2,
				returnedQty: 1,
				unitaryPrice: 25
			};

			function endpoint() {
				return document.getElementById('endpoint').value.replace(/\/$/, '');
			}

			function uniqueName(prefix) {
				return prefix + ' ' + Date.now() + ' ' + Math.floor(Math.random() * 100000);
			}

			async function request(path, options) {
				options = options || {};

				const headers = {
					accept: 'application/json, text/plain, */*'
				};

				if (options.bearer) {
					headers.Authorization = 'Bearer ' + options.bearer;
				}

				if (Object.prototype.hasOwnProperty.call(options, 'body')) {
					headers['content-type'] = 'application/json';
				}

				const response = await fetch(endpoint() + path, {
					method: options.method || 'GET',
					headers,
					body: Object.prototype.hasOwnProperty.call(options, 'body') ? JSON.stringify(options.body) : undefined,
					mode: 'cors',
					credentials: 'omit'
				});

				const text = await response.text();
				const data = text.trim() === '' ? {} : JSON.parse(text);

				if (!response.ok) {
					const error = new Error((options.method || 'GET') + ' ' + path + ' failed with HTTP ' + response.status);
					error.response = data;
					throw error;
				}

				return data;
			}

			async function login() {
				const data = await request('/login.php', {
					method: 'POST',
					body: {
						username: document.getElementById('username').value,
						password: document.getElementById('password').value
					}
				});

				if (!data.session || !data.session.id) {
					throw new Error('Login response did not include session.id: ' + JSON.stringify(data));
				}

				if (!data.user || !data.user.id) {
					throw new Error('Login response did not include user.id: ' + JSON.stringify(data));
				}

				return {
					bearer: data.session.id,
					user: data.user
				};
			}

			async function createStockItem(bearer) {
				const itemName = uniqueName('consigna delivered');
				const data = await request('/item_info.php', {
					method: 'POST',
					bearer,
					body: {
						item: {
							applicable_tax: 'DEFAULT',
							availability_type: 'ON_STOCK',
							clave_sat: '53111603',
							currency_id: 'MXN',
							name: itemName,
							note_required: 'NO',
							on_sale: 'YES',
							reference_price: 0,
							status: 'ACTIVE',
							unidad_medida_sat_id: 'H87'
						}
					}
				});

				if (!data.item || !data.item.id) {
					throw new Error('Item creation response did not include item.id: ' + JSON.stringify(data));
				}

				return {
					itemId: data.item.id,
					itemName
				};
			}

			async function setStock(itemId, bearer) {
				return request('/updates.php', {
					method: 'POST',
					bearer,
					body: {
						method: 'adjustStock',
						stock_records: [
							{
								store_id: scenario.storeId,
								qty: scenario.initialStock,
								item_id: itemId
							}
						]
					}
				});
			}

			async function createDeliveredConsignment(itemId, sellerUserId, bearer) {
				const data = await request('/consignment_delivered_info.php', {
					method: 'POST',
					bearer,
					body: {
						consignment_delivered: {
							seller_user_id: sellerUserId,
							store_id: scenario.storeId
						},
						items: [
							{
								consignment_delivered_item: {
									item_id: itemId,
									qty: scenario.deliveredQty,
									unitary_price: scenario.unitaryPrice
								}
							}
						]
					}
				});

				const consignment = data.consignment_delivered;
				const item = data.items && data.items[0] && data.items[0].consignment_delivered_item;

				if (!consignment || !consignment.id || !item || !item.id) {
					throw new Error('Delivered consignment creation response did not include expected ids: ' + JSON.stringify(data));
				}

				return {
					consignmentId: consignment.id,
					consignmentItemId: item.id
				};
			}

			async function settleDeliveredConsignment(consignmentId, consignmentItemId, bearer) {
				return request('/updates/consignment_delivered_settle.php', {
					method: 'POST',
					bearer,
					body: {
						consignment_delivered_id: consignmentId,
						return_items: [
							{
								id: consignmentItemId,
								returned_qty: scenario.returnedQty,
								sold_qty: scenario.soldQty
							}
						]
					}
				});
			}

			async function getOrdersForConsignment(consignmentId, bearer) {
				return request('/order_info.php?consignment_delivered_id=' + encodeURIComponent(consignmentId), { bearer });
			}

			async function getCurrentStock(itemId, bearer) {
				const data = await request(
					'/stock_record_info.php?item_id=' + encodeURIComponent(itemId) + '&store_id=' + encodeURIComponent(scenario.storeId) + '&is_current=1',
					{ bearer }
				);

				if (!data.data || !data.data.length) {
					throw new Error('Current stock record not found for item ' + itemId + ': ' + JSON.stringify(data));
				}

				return data.data[0].stock_record || data.data[0];
			}

			function fullConsignmentFrom(response) {
				if (response.consignment_delivered) {
					return response;
				}

				if (response.data && response.data[0] && response.data[0].consignment_delivered) {
					return response.data[0];
				}

				throw new Error('Settlement response is not full consignment info: ' + JSON.stringify(response));
			}

			QUnit.module('Delivered Consignment');

			QUnit.test('settlement returns full info and creates one closed linked order', async function(assert) {
				assert.timeout(30000);
				assert.expect(15);

				const session = await login();
				assert.ok(session.bearer, 'logged in');
				assert.ok(session.user.id, 'loaded current user');

				const item = await createStockItem(session.bearer);
				assert.ok(item.itemId, 'created fresh stock item');

				await setStock(item.itemId, session.bearer);
				const stockBefore = await getCurrentStock(item.itemId, session.bearer);
				assert.equal(Number(stockBefore.qty), scenario.initialStock, 'stock was adjusted');

				const ids = await createDeliveredConsignment(item.itemId, session.user.id, session.bearer);
				assert.ok(ids.consignmentId, 'created delivered consignment');
				assert.ok(ids.consignmentItemId, 'created delivered consignment item');

				const stockAfterDelivery = await getCurrentStock(item.itemId, session.bearer);
				assert.equal(Number(stockAfterDelivery.qty), scenario.initialStock - scenario.deliveredQty, 'delivery removed stock');

				const settled = fullConsignmentFrom(await settleDeliveredConsignment(ids.consignmentId, ids.consignmentItemId, session.bearer));
				const settledItem = settled.items && settled.items[0] && settled.items[0].consignment_delivered_item;

				assert.equal(settled.consignment_delivered.status, 'SETTLED', 'settlement returned full consignment info');
				assert.equal(Number(settledItem.returned_qty), scenario.returnedQty, 'returned quantity was saved');
				assert.equal(Number(settledItem.sold_qty), scenario.soldQty, 'sold quantity was saved');

				const orders = await getOrdersForConsignment(ids.consignmentId, session.bearer);
				assert.equal(orders.data.length, 1, 'one sale order was generated');

				const order = orders.data[0].order || orders.data[0];
				assert.equal(Number(order.consignment_delivered_id), Number(ids.consignmentId), 'sale order is linked to delivered consignment');
				assert.equal(order.status, 'CLOSED', 'sale order is closed');
				assert.equal(Number(order.total), scenario.soldQty * scenario.unitaryPrice, 'sale order total matches sold quantity');

				const stockAfterSettlement = await getCurrentStock(item.itemId, session.bearer);
				assert.equal(Number(stockAfterSettlement.qty), scenario.initialStock - scenario.soldQty, 'final stock keeps only sold quantity removed');
			});

			QUnit.start();
		</script>
	</body>
</html>
